## Why not HTML?

Markdown is easy to read, edit, diff, and archive. HTML is powerful, but AI-generated HTML is hard to review and can become a safety boundary problem. AIO keeps the source simple and lets a deterministic runtime handle the presentation.

```aio:callout@1
{
  "tone": "warning",
  "title": "Security boundary",
  "body": "AIO v0.1 does not allow AI-generated HTML, CSS, JavaScript, iframes, event handlers, custom components, or remote schemas."
}
